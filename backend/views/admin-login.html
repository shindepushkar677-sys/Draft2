<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Rachanatmak</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <main class="admin-shell">
    <div class="admin-top">
      <a class="logo" href="index.html" aria-label="Rachanatmak home">रचनात्मक</a>
      <a class="text-link" href="index.html">Back to site →</a>
    </div>

    <section class="admin-card">
      <p class="eyebrow">Admin access</p>
      <h1 class="section-title">Login</h1>
      <form class="contact-form" method="POST" action="/admin/login">
        <label class="field">
          <span>Username</span>
          <input name="username" type="text" autocomplete="username" required>
        </label>
        <label class="field">
          <span>Password</span>
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="button" type="submit">Enter dashboard</button>
        <p class="form-status" id="login-status"></p>
      </form>
    </section>
  </main>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      document.body.classList.add('is-loaded');

      if (new URLSearchParams(window.location.search).has('error')) {
        document.getElementById('login-status').textContent = 'Invalid username or password.';
      }
    });
  </script>
</body>
</html>
